apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: modelmesh

bases:
  - ../../base

# Dev: single replica, debug logging, local images
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: modelmesh-api:latest
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: modelmesh-api

configMapGenerator:
  - name: modelmesh-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - SHADOW_TRAFFIC_PCT=0.10
