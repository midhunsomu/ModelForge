apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: modelmesh

bases:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: modelmesh-api

configMapGenerator:
  - name: modelmesh-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - SHADOW_TRAFFIC_PCT=0.05
      - AUTO_PROMOTE=false

images:
  - name: modelmesh-api
    newName: ghcr.io/your-org/modelmesh/api
    newTag: latest  # overridden by CI with sha-XXXXXXX
